<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarginMix LinkedIn Cover</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f3f4f6;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 40px;
    }
    .instructions {
      margin-bottom: 20px;
      text-align: center;
      color: #374151;
    }
    .instructions h2 {
      margin-bottom: 10px;
    }
    .instructions p {
      color: #6b7280;
    }
    .cover-container {
      width: 1584px;
      height: 396px;
      background: linear-gradient(135deg, #064e3b 0%, #059669 25%, #0d9488 50%, #0891b2 75%, #0e7490 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    .cover-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, rgba(255,255,255,0.08) 0%, transparent 40%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.05) 0%, transparent 30%);
    }
    .cover-container::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: 0.5;
    }
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: white;
    }
    .logo {
      font-size: 72px;
      font-weight: 700;
      letter-spacing: -2px;
      margin-bottom: 8px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .tagline {
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      font-size: 28px;
      opacity: 0.95;
      text-shadow: 0 2px 10px rgba(0,0,0,0.15);
    }
    .decorative-line {
      width: 120px;
      height: 3px;
      background: rgba(255,255,255,0.4);
      margin: 16px auto;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="instructions">
    <h2>MarginMix LinkedIn Cover Image</h2>
    <p>Right-click on the image below and select "Save image as..." or take a screenshot.<br>
    Size: 1584 × 396 pixels</p>
  </div>
  
  <div class="cover-container">
    <div class="content">
      <div class="logo">MarginMix</div>
      <div class="decorative-line"></div>
      <div class="tagline">Margin Risk Clarity</div>
    </div>
  </div>
</body>
</html>
